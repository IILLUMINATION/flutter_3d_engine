name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: example
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libunwind-dev
        if: runner.os == 'Linux'

      - run: flutter pub get
      - run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: flutter_3d_demo_windows
          path: example/build/windows/x64/runner/Release/
