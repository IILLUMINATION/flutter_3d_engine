name: flutter_rust_3d
description: GPU 3D engine for Flutter. Rust + wgpu + Rapier3D, rendered into irondash native texture.
version: 0.1.0
repository: https://github.com/IILLUMINATION/flutter_3d_engine

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  irondash_engine_context: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
