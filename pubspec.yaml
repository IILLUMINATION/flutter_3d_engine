name: flutter_rust_3d
description: "High-performance 3D renderer for Flutter. Powered by wgpu, irondash native textures, and Rust via flutter_rust_bridge."
version: 0.1.0
repository: https://github.com/IILLUMINATION/flutter_3d_engine

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  rust_lib_flutter_rust_3d:
    path: rust_builder
  flutter_rust_bridge: 2.12.0
  irondash_engine_context: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
